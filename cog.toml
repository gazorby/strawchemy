tag_prefix = "v"
branch_whitelist = ["main"]
ignore_merge_commits = true
pre_bump_hooks = [
  "uv version --no-sync {{version}}",
]
post_bump_hooks = [
  "git push",
  "git push origin {{version_tag}}",
]

[changelog]
path = "CHANGELOG.md"
template = "remote"
remote = "github.com"
owner = "gazorby"
repository = "strawchemy"

[commit_types]
feat = { changelog_title = "🚀 Features" }
fix = { changelog_title = "🐛 Bug Fixes" }
docs = { changelog_title = "📚 Documentation" }
perf = { changelog_title = "⚡ Performance" }
refactor = { changelog_title = "🚜 Refactor" }
style = { changelog_title = "🎨 Styling" }
build = { changelog_title = "⚙️ Miscellaneous Tasks" }
ci = { changelog_title = "⚙️ Miscellaneous Tasks" }
revert = { changelog_title = "◀️ Revert" }

chore = { omit_from_changelog = true }
test = { omit_from_changelog = true }

[bump_profiles.manual]
pre_bump_hooks = [
  "uv version --no-sync {{version}}",
  "mise run lint",
  "mise run test"
]

post_bump_hooks = [
  "echo 'This is a manual bump, no release or push to remote will be triggered'"
]
