[env]
PROJECT_NAME = "strawchemy"
_.python.venv = { path = ".venv" }
_.file = ".env"

[tools]
jq = "latest"
pre-commit = "latest"
actionlint = "latest"

[vars]
local_pytest_options = "-n=auto -vv"
uv_run = "uv run --frozen"
pytest_coverage_options = "--cov-config=./pyproject.toml --cov=src --cov-report=html --cov-report=xml"
ci_uv_run_options = " --frozen --no-default-groups --only-group=nox"
ci_pytest_coverage_options = "--cov-config=./pyproject.toml --cov=src --junit-xml=./junit.xml -o junit_family=legacy"
cleanable_paths = '''{{
[
  ".nox",
  ".pytest_cache",
  ".ruff_cache",
  ".hypothesis",
  "build/",
  "dist/",
  ".eggs/",
  ".coverage",
  "coverage.xml",
  "coverage.json",
  "junit*.xml",
  "htmlcov/",
  "tests/.pytest_cache",
  "tests/**/.pytest_cache",
  ".mypy_cache",
  ".unasyncd_cache/",
  ".auto_pytabs_cache",
  "node_module",
] | join(sep=" ")
}}'''

# ###############
# Dependencies
# ###############

[tasks."uv:install"]
description = "Install dependencies"
run = "uv sync --all-extras"

[tasks.install]
description = "Install dependencies and pre-commit hooks"
alias = "i"
depends = ["install:pre-commit", "uv:install"]

[tasks."install:pre-commit"]
description = "Install pre-commit hooks"
run = "pre-commit install --install-hooks 2>&1"

# ###############
# Test
# ###############

[tasks.test]
description = "Run tests"
depends = "uv:install"
alias = "t"
usage = 'arg "[test]" var=#true'
run = "uv run pytest {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:coverage"]
description = "Run tests with coverage"
depends = "uv:install"
alias = "tc"
usage = 'arg "[test]" var=#true'
run = "uv run pytest {{vars.local_pytest_options}} {{vars.pytest_coverage_options}} ${usage_test-}"

[tasks."test:patch-coverage"]
description = "Run tests and report coverage on changed lines only (vs a branch)"
depends = "uv:install"
alias = "tpc"
usage = '''
flag "--branch <branch>" default="main"
flag "--fail-under <fail_under>" default="100"
arg "[test]" var=#true
'''
run = [
  "{{vars.uv_run}} diff-cover coverage.xml --compare-branch=${usage_branch} --fail-under=${usage_fail_under}",
]

[tasks."test:unit"]
description = "Run unit tests"
depends = "uv:install"
alias = "tu"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t unit -- tests/unit {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:unit:no-extras"]
description = "Run unit tests without extras dependencies"
depends = "uv:install"
alias = "tug"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -s unit-no-extras -- tests/unit {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:unit:coverage"]
description = "Run unit tests with coverage"
depends = "uv:install"
alias = "tuc"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t unit -- tests/unit {{vars.local_pytest_options}} {{vars.pytest_coverage_options}} ${usage_test-}"

[tasks."test:integration"]
description = "Run integration tests"
depends = "uv:install"
alias = "ti"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -s integration -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:integration-postgres"]
description = "Run integration tests"
depends = "uv:install"
alias = "ti-postgres"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t postgres -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:integration-mysql"]
description = "Run integration tests"
depends = "uv:install"
alias = "ti-mysql"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t mysql -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:integration-sqlite"]
description = "Run integration tests"
depends = "uv:install"
alias = "ti-sqlite"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t sqlite -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:integration:coverage"]
description = "Run integration tests with coverage"
depends = "uv:install"
alias = "tic"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -s integration -- {{vars.local_pytest_options}} {{vars.pytest_coverage_options}} ${usage_test-}"

[tasks."test:unit-all"]
description = "Run unit tests on all supported python versions"
depends = "uv:install"
alias = "tua"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -t unit -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:integration-all"]
description = "Run integration tests on all supported python versions"
depends = "uv:install"
alias = "tia"
usage = '''
flag "--python <python>" default="3.13"
arg "[test]" var=#true
'''
run = "uv run nox -r -P ${usage_python-} -s integration -- {{vars.local_pytest_options}} ${usage_test-}"

[tasks."test:update-snapshots"]
description = "Run snapshot-based tests and update snapshots"
depends = "uv:install"
run = "uv run pytest {{vars.local_pytest_options}} -m snapshot --snapshot-update"

[tasks."test:add-new-snapshots"]
description = "Run snapshot-based tests and add new snapshots"
depends = "uv:install"
run = "uv run pytest {{vars.local_pytest_options}} -m snapshot --snapshot-update-new-only"

# ###############
# CI
# ###############

[tasks."ci:install"]
description = "Install dependencies and pre-commit hooks"
run = "uv venv --allow-existing"

[tasks."ci:test"]
description = "Run tests in CI"
usage = 'arg "<session>"'
depends = "ci:install"
env = { UV_PYTHON_PREFERENCE = "only-managed" }
run = "uv run {{vars.ci_uv_run_options}} nox -s \"${usage_session-}\" -- -n=2 {{vars.ci_pytest_coverage_options}}"

[tasks."ci:lint"]
description = "Lint CI yaml files"
run = "actionlint -shellcheck ''"

[tasks."ci:test-matrix"]
description = "Output test matrix for CI"
depends = "ci:install"
run = '''
    uv run {{vars.ci_uv_run_options}} nox --json -t tests -t ci -l |
    jq 'map(
        {
        session,
        tags,
        python,
        name,
        job_name: "\( .name ) on \( .python )\( if .call_spec != {} then " (\(.call_spec | to_entries | map("\(.key)=\(.value)") | join(", ")))" else "" end )"
        }
    )'
'''

[tasks."ci:test-sessions"]
description = "Output test session names for CI"
depends = "ci:install"
run = "uv run {{vars.ci_uv_run_options}} nox --json -t tests -l | jq 'map(.name) | unique'"

# ###############
# Linting
# ###############

[tasks."ruff:check"]
description = "Check ruff formatting"
run = "{{vars.uv_run}} ruff --version  && {{vars.uv_run}} ruff check"

[tasks."ruff:fix"]
description = "Fix ruff errors"
run = "{{vars.uv_run}} ruff check --fix --unsafe-fixes"

[tasks."ruff:format"]
description = "Format code"
run = "{{vars.uv_run}} ruff format"

[tasks."ruff:format:check"]
description = "Format code"
run = "{{vars.uv_run}} ruff --version && {{vars.uv_run}} ruff format --check"

[tasks.tombi]
description = "Run tombi"
run = "{{vars.uv_run}} tombi format"

[tasks.ty]
description = "Run ty"
run = "{{vars.uv_run}} ty --version && {{vars.uv_run}} ty check"

[tasks.vulture]
description = "Run vulture"
run = "{{vars.uv_run}} vulture --version && uv run vulture"

[tasks.format]
description = "Lint the code"
alias = "f"
depends = ["ruff:format", "tombi"]

[tasks.unasyncd]
description = "Generate synchronous code from asynchronous version"
wait_for = ["slotscheck"]
run = '''
  uv run --quiet --only-group unasyncd unasyncd
'''

[tasks."unasyncd:check"]
description = "Check synchronous code from asynchronous version"
wait_for = ["slotscheck"]
run = '''
  uv run --quiet --only-group unasyncd unasyncd --check
'''

[tasks.lint]
description = "Lint the code"
alias = "l"
depends = [
  "vulture",
  "ty",
  "ruff:check",
  "ruff:format:check",
  "slotscheck",
  "unasyncd:check"
]

[tasks.pre-commit]
description = "Run pre-commit checks"
depends = "install:pre-commit"
run = "pre-commit run --color=always --all-files"

[tasks.slotscheck]
description = "Run slotscheck"
run = "uv run slotscheck --version && uv run slotscheck"

# ###############
# Tools
# ###############

[tasks.auto-bump]
description = "Auto bump the version"
confirm = "Are you sure you want to auto bump the version?"
depends = "uv:install"
run = "uv run bump-my-version bump --new-version $(uv run git cliff --unreleased --bumped-version)"

[tasks.clean]
description = "Clean working directory"
alias = "c"
confirm = "Are you sure you want to clean the working directory? This will remove test caches, build artifacts, and other temporary files."
run = [
  "rm -rf {{vars.cleanable_paths}} >/dev/null 2>&1",
  "find . -name '*.egg-info' -exec rm -rf {} + >/dev/null 2>&1",
  "find . -type f -name '*.egg' -exec rm -f {} + >/dev/null 2>&1",
  "find . -name '*.pyc' -exec rm -f {} + >/dev/null 2>&1",
  "find . -name '*.pyo' -exec rm -f {} + >/dev/null 2>&1",
  "find . -name '*~' -exec rm -f {} + >/dev/null 2>&1",
  "find . -name '__pycache__' -exec rm -rf {} + >/dev/null 2>&1",
  "find . -name '.ipynb_checkpoints' -exec rm -rf {} + >/dev/null 2>&1",
]

[tasks."render:usage"]
description = "Generate tasks documentation"
run = ["mise generate task-docs > tasks.md"]
